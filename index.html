<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultimate QR Web App</title>

<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">

<!-- QR Libraries -->
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
<script src="https://unpkg.com/html5-qrcode"></script>
</head>

<body>

<h1>Ultimate QR Web App</h1>
<button id="mode-toggle">Toggle Dark/Light Mode</button>
<button id="installBtn" style="display:none;">Install App</button>

<div class="container">

  <div class="card">
    <h2>Generate QR Code</h2>
    <input type="text" id="qr-text" placeholder="Type text or URL">
    <button onclick="generateQR()">Generate QR</button>
    <canvas id="qr-code"></canvas>
    <button onclick="copyQRText()">Copy QR Text</button>
    <button onclick="downloadQR()">Download QR Image</button>
    <p id="scan-count">Total Scans: 0</p>

    <h3>Scan History</h3>
    <ul id="history-list"></ul>
  </div>

  <div class="card">
    <h2>Scan QR Code</h2>
    <div id="reader"></div>
    <div id="qr-result">Scanned Result Will Appear Here</div>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
