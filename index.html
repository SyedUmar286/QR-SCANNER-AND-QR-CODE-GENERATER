<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultimate QR Web App</title>

<!-- QR Libraries -->
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
<script src="https://unpkg.com/html5-qrcode"></script>

<!-- Styles -->
<style>
  * { box-sizing: border-box; transition: all 0.3s; }
  body {
    font-family: 'Segoe UI', sans-serif;
    margin: 0; padding: 0;
    background-color: #1e1e2f;
    color: white;
    display: flex; flex-direction: column; align-items: center;
    min-height: 100vh;
  }
  body.light { background-color: #f5f5f5; color: #1e1e2f; }
  h1 { margin: 20px 0; color: #00ffff; text-align: center; }
  body.light h1 { color: #007bff; }
  .container {
    display: flex; flex-wrap: wrap; justify-content: center;
    width: 100%; max-width: 1200px; margin-bottom: 50px;
  }
  .card {
    background-color: #2e2e3e;
    margin: 20px; padding: 20px; border-radius: 15px;
    flex: 1 1 400px; min-width: 350px; display: flex;
    flex-direction: column; align-items: center;
    box-shadow: 0 8px 20px rgba(0,0,0,0.5);
  }
  body.light .card { background-color: #ffffff; box-shadow: 0 8px 20px rgba(0,0,0,0.1); }
  input[type=text] {
    width: 100%; padding: 12px; border-radius: 8px; border: none;
    margin-bottom: 10px; font-size: 16px;
  }
  button {
    padding: 12px 15px; width: 100%; font-size: 16px; border: none;
    border-radius: 8px; background-color: #00ffff; color: #1e1e2f;
    cursor: pointer; margin-bottom: 10px; transition: 0.3s;
  }
  button:hover { background-color: #00cccc; }
  body.light button { background-color: #007bff; color: white; }
  body.light button:hover { background-color: #0056b3; }
  #qr-code { margin-top: 10px; }
  #reader { width: 100%; max-width: 500px; margin-top: 10px; }
  #qr-result { margin-top: 15px; word-break: break-word; font-weight: bold; color: #00ff88; text-align: center; }
  body.light #qr-result { color: #007bff; }
  #mode-toggle { position: fixed; top: 10px; right: 10px; padding: 8px 12px; border-radius: 8px; }
  @media(max-width: 768px){
    .container { flex-direction: column; align-items: center; }
    .card { width: 90%; }
  }
</style>
</head>
<body>

<h1>Ultimate QR Web App</h1>
<button id="mode-toggle">Toggle Dark/Light Mode</button>

<div class="container">

  <!-- QR Generator -->
  <div class="card">
    <h2>Generate QR Code</h2>
    <input type="text" id="qr-text" placeholder="Type text or URL">
    <button onclick="generateQR()">Generate QR</button>
    <canvas id="qr-code"></canvas>
    <button onclick="copyQRText()">Copy QR Text</button>
    <button onclick="downloadQR()">Download QR Image</button>
  </div>

  <!-- QR Scanner -->
  <div class="card">
    <h2>Scan QR Code</h2>
    <div id="reader"></div>
    <div id="qr-result">Scanned Result Will Appear Here</div>
  </div>

</div>

<script>
  // Dark/Light Mode
  const modeBtn = document.getElementById("mode-toggle");
  modeBtn.onclick = () => document.body.classList.toggle("light");

  // QR Generator
  const qrInput = document.getElementById("qr-text");
  const qrCanvas = document.getElementById("qr-code");

  function generateQR(){
    const text = qrInput.value;
    if(!text){
      qrCanvas.getContext('2d').clearRect(0,0, qrCanvas.width, qrCanvas.height);
      return;
    }
    QRCode.toCanvas(qrCanvas, text, { width: 250 }, function(err){ if(err) console.error(err); });
  }
  qrInput.addEventListener('input', generateQR);

  // Copy QR Text
  function copyQRText(){
    const text = qrInput.value;
    if(!text) { alert("No text to copy!"); return; }
    navigator.clipboard.writeText(text).then(()=> alert("Copied to clipboard!"));
  }

  // Download QR Image
  function downloadQR(){
    const link = document.createElement('a');
    link.download = "qr-code.png";
    link.href = qrCanvas.toDataURL();
    link.click();
  }

  // QR Scanner
  function onScanSuccess(decodedText, decodedResult){
    document.getElementById("qr-result").innerText = decodedText;
  }

  const html5QrcodeScanner = new Html5QrcodeScanner(
    "reader", { fps: 10, qrbox: 300, rememberLastUsedCamera: true });
  html5QrcodeScanner.render(onScanSuccess);
</script>

</body>
</html>
