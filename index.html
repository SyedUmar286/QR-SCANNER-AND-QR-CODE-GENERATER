<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultimate QR Web App</title>

<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">

<!-- Professional Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<!-- QR Libraries -->
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
<script src="https://unpkg.com/html5-qrcode"></script>
</head>

<body>

<nav class="navbar">
  <h2>Ultimate QR Platform</h2>
</nav>

<h1>QR Generator & Scanner</h1>
<button id="mode-toggle">Toggle Dark/Light Mode</button>
<button id="installBtn" style="display:none;">Install App</button>

<div class="container">

  <div class="card">

    <div class="tabs">
      <button onclick="setType('text')">Text</button>
      <button onclick="setType('url')">URL</button>
      <button onclick="setType('wifi')">WiFi</button>
      <button onclick="setType('email')">Email</button>
      <button onclick="setType('phone')">Phone</button>
    </div>

    <div id="inputs"></div>

    <button onclick="generateQR()">Generate QR</button>
    <canvas id="qr-code"></canvas>
    <div class="size-controls">

  <h3>QR Size</h3>
  <button onclick="decreaseQR()">−</button>
  <button onclick="increaseQR()">+</button>

  <h3>Logo Size</h3>
  <button onclick="decreaseLogo()">−</button>
  <button onclick="increaseLogo()">+</button>

</div>
    <br><br>

<label for="logoInput" class="custom-file-upload">
  Add Center Logo
</label>
<input type="file" id="logoInput" accept="image/*" hidden>
<p id="logoMessage" style="font-size:14px;"></p>
<button id="fixLogoBtn" style="display:none;">Fix Logo Size</button>
    <button onclick="copyQRText()">Copy QR Text</button>
    <button onclick="downloadQR()">Download QR Image</button>

    <p id="scan-count">Total Scans: 0</p>
    <button onclick="clearHistory()">Clear History</button>

    <h3>Scan History</h3>
    <ul id="history-list"></ul>
  </div>

  <div class="card">
    <h2>Scan QR Code</h2>
    <div id="reader"></div>
    <br>
<input type="file" id="scanImage" accept="image/*">
<button onclick="scanImageQR()">Scan Image</button>
    <div id="qr-result"></div>
    <button id="openLinkBtn" style="display:none;" onclick="openLink()">Open Link</button>
  </div>

</div>

<footer>
  <p>Made by Your Name</p>
</footer>

<script src="script.js"></script>
</body>
</html>
